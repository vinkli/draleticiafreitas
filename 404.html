<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada · Dra. Letícia Freitas — Pediatra</title>
<meta name="robots" content="noindex, follow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'">
<meta name="theme-color" content="#A64D6E">
<link rel="stylesheet" href="fonts.css">
<style>
  :root{--bg:#FCFAF8;--ink:#3B2B34;--ink-soft:#6E5D66;--accent:#A64D6E;--accent-dk:#8A3B58;--rosa:#F7D9E3;--azul:#CFE4F2}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Nunito Sans",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.6;position:relative;overflow:hidden}
  .blob{position:absolute;filter:blur(10px);opacity:.5;border-radius:50%;z-index:0}
  .b1{width:320px;height:320px;top:-120px;right:-100px;background:radial-gradient(circle,var(--rosa),transparent 70%)}
  .b2{width:300px;height:300px;bottom:-120px;left:-100px;background:radial-gradient(circle,var(--azul),transparent 70%)}
  .box{position:relative;z-index:1;max-width:440px}
  .code{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:5rem;color:var(--accent);line-height:1}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.6rem;margin:.4rem 0 .6rem}
  p{color:var(--ink-soft);margin-bottom:1.6rem}
  .btn{display:inline-block;background:var(--accent);color:#fff;font-weight:800;padding:.85rem 1.5rem;border-radius:100px;text-decoration:none}
  .btn:hover{background:var(--accent-dk)}
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="box">
    <div class="code">404</div>
    <h1>Essa página a gente não encontrou</h1>
    <p>O link pode ter mudado de lugar. Mas o cuidado com o seu filho continua aqui — vamos voltar ao começo?</p>
    <a class="btn" href="/">Voltar à página inicial</a>
  </div>
</body>
</html>
